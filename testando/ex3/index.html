<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notas</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>
<body>
    <header class="menu">
        <img src="#" alt="Logo" class="Logo">
        <div class="barraPesquisa">
            <span class="material-symbols-outlined">search</span>
            Pesquisa</div>
        <section class="funcoes">
            <span class="material-symbols-outlined">person</span>          
            <span class="material-symbols-outlined">logout</span>
    </header>
    <main class="container">
        <section class="dados">
            <!-- entrada dos dados para fazer o calculo e gerar o boletim -->
            <label for="nome">Aluno(a):</label>
            <input type="text" name="nome" id="nome">
            <label for="materia">Matéria:</label>
            <input type="text" name="materia" id="materia" class="inputs">
            <label for="nota">Nota: </label>
            <input type="number" name="Nota" id="nota" class="inputs">
            <label for="faltas">Faltas: </label>
            <input type="number" name="faltas" id="faltas" class="inputs">
        </section>
        <section class="avisos">
            <!-- Avisos recorrentes de erros apareceram aqui ! -->
        </section>
        <section class="botoes">
            <!-- Irá calcular e gerar o boletim do aluno -->
            <button class="calc">Adicionar Matéria</button>
            <button class="gerar">Boletim</button>             
        </section>
        <section  class="boletim">
            <!-- O boletim irá ser exibido aqui !! -->
            <div class="aluBoletim">

            </div>
            <ul class="lista">
                
            </ul>
            <div class="medF">

            </div>
        </section>
    </main>
    <footer class="rodape">
        @Solstel - Projeto 2026
    </footer>
    <script src="media.js"></script>
</body>
</html>
